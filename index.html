<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HelpDesk</title><link rel="stylesheet" href="style.css"><script defer="defer" src="bundle.js"></script><link href="style.css" rel="stylesheet"></head><body><div class="container"><div class="header"><h1>HelpDesk</h1><button class="btn add-ticket-btn">Добавить тикет</button></div><div class="loader hidden"><img src="loading.gif" alt="Loading..."></div><div class="tickets-list"></div></div><div class="modal-overlay hidden"></div><div class="modal hidden"><h2 class="modal-title">Добавить тикет</h2><form class="modal-form"><label>Краткое описание <input name="name" class="input-name" required></label> <label>Подробное описание <textarea name="description" class="input-desc" rows="4"></textarea></label><div class="modal-buttons"><button type="button" class="btn cancel-btn">Отмена</button> <button type="submit" class="btn ok-btn">Ок</button></div></form></div><div class="modal-confirm hidden"><h2 class="modal-title">Удалить тикет</h2><p>Вы уверены, что хотите удалить тикет? Это действие необратимо.</p><div class="modal-buttons"><button type="button" class="btn cancel-btn">Отмена</button> <button type="button" class="btn delete-btn ok-btn">Ок</button></div></div><script src="bundle.js"></script></body></html>
